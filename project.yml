name: DLNAviewer
options:
  bundleIdPrefix: com.mtkg
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  DLNAKit:
    path: DLNAKit

settings:
  base:
    MARKETING_VERSION: "1.0.21"
    CURRENT_PROJECT_VERSION: "22"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: G72M73C546
    CODE_SIGN_STYLE: Automatic

targets:
  DLNAviewer:
    type: application
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "26.0"
      macOS: "26.0"
    sources:
      - path: App
    dependencies:
      - package: DLNAKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtkg.dlnaviewer
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # エンタイトルメントはプラットフォーム別に分ける。共有すると iOS に macOS 専用キー
        # （com.apple.security.app-sandbox）が混ざり、iOS の App Store 配布署名が失敗する。
        CODE_SIGN_ENTITLEMENTS: App/DLNAviewer-iOS.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": App/DLNAviewer-macOS.entitlements
        # Hardened Runtime は macOS 専用。
        "ENABLE_HARDENED_RUNTIME[sdk=macosx*]": YES
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: DLNAviewer
        # バージョンはビルド設定を参照する。明示しないと xcodegen が既定値 "1.0" / "1" を
        # 直値で埋め、アプリ内の現在バージョンが常に古いままになる（アップデート確認が
        # 「新版あり」を出し続ける）。
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.video
        # 輸出コンプライアンス: 独自・非標準の暗号化は使わず、OS 標準の HTTPS/TLS のみ
        # （免除対象）。これを宣言すると TestFlight 配布ごとの質問がスキップされる。
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - audio
        NSLocalNetworkUsageDescription: "同一ネットワーク上の DLNA メディアサーバーを探索・接続するために使用します。"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

schemes:
  DLNAviewer:
    build:
      targets:
        DLNAviewer: all
    run:
      config: Debug
    archive:
      config: Release
